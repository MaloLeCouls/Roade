# CI Roade — lint, format, tests, build sur chaque push main + chaque PR.
# Anti-slop : un seul workflow, deux jobs en parallèle (backend / frontend),
# pas de matrice de versions tant qu'on n'en a pas le besoin réel.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install deps (locked)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check backend tests

      - name: Ruff format check
        run: uv run ruff format --check backend tests

      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (ESLint + Prettier + Vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps (locked)
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript (typecheck)
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Vite build
        run: npm run build
